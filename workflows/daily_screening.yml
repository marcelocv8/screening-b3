name: Daily Screening Runner

on:
  schedule:
    - cron: '20 19 * * 1-5'  # 19:20 UTC = 16:20 BRT, Mon-Fri
  workflow_dispatch:  # Manual trigger

jobs:
  run-screening:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run screening
      run: python run_screening.py
      env:
        BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add results/
        git diff --staged --quiet || (git commit -m "Update screening results $(date +%Y-%m-%d)" && git push)
    
    - name: Cleanup old results (keep last 5)
      run: |
        # Remove screening files older than the 5 most recent
        for ext in parquet json csv; do
          files=$(ls -t results/screening_*.$ext 2>/dev/null | tail -n +6)
          if [ -n "$files" ]; then
            echo "$files" | xargs -r git rm
          fi
        done
        # Also remove summary.json if there are old ones (keep latest)
        old_summary=$(ls -t results/summary.json 2>/dev/null | tail -n +2)
        if [ -n "$old_summary" ]; then
          echo "$old_summary" | xargs -r git rm
        fi
        git diff --staged --quiet || (git commit -m "Cleanup old results" && git push)

name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 12 */2 * *'  # Every 2 days at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          curl -s -o /dev/null -w "%{http_code}" "https://screening-b3.streamlit.app" || echo "Ping failed"

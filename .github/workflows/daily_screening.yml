name: Daily Screening Runner

on:
  schedule:
    - cron: '20 19 * * 1-5'  # 19:20 UTC = 16:20 BRT, Mon-Fri
  workflow_dispatch:  # Manual trigger

jobs:
  run-screening:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run screening
      run: python run_screening.py
      env:
        BRAPI_TOKEN: ${{ secrets.BRAPI_TOKEN }}
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add results/
        git diff --staged --quiet || (git commit -m "Update screening results $(date +%Y-%m-%d)" && git push)
